<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Practicals</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#141E30,#243B55);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .container{
      width:90%;
      max-width:900px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      color:#222;
      font-size:42px;
      letter-spacing:1px;
    }

    .practical-box{
      display:flex;
      flex-direction:column;
      gap:25px;
    }

    .card{
      background:linear-gradient(135deg,#00C9FF,#92FE9D);
      padding:25px;
      border-radius:15px;
      text-decoration:none;
      color:#111;
      font-size:22px;
      font-weight:bold;
      transition:0.4s;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .card:hover{
      transform:translateY(-8px) scale(1.02);
    }

    @media(max-width:768px){
      h1{
        font-size:32px;
      }

      .card{
        font-size:18px;
        padding:20px;
      }
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>React</h1>

    <div class="practical-box">

      <a href="components/1.jsx" class="card">
        1. Functional Component with Props
      </a>

      <a href="components/2.jsx" class="card">
        2. Class Component Counter
      </a>

      <a href="components/3.jsx" class="card">
        3. Functional Counter
      </a>

      <a href="components/4.jsx" class="card">
        4. Running Clock
      </a>

      <a href="components/5.jsx" class="card">
        5. Form State Update
      </a>

    </div>

  </div>

</body>
</html>
