<!DOCTYPE html>
<html>
<head>
<style>
.static{position:static;background:red;}
.relative{position:relative;left:30px;background:yellow;}
.absolute{position:absolute;top:100px;left:100px;background:green;}
.fixed{position:fixed;bottom:0;background:blue;color:white;}
.sticky{position:sticky;top:0;background:pink;}
</style>
</head>
<body>
<div class="static">Static</div>
<div class="relative">Relative</div>
<div class="absolute">Absolute</div>
<div class="sticky">Sticky</div>
<div class="fixed">Fixed</div>
</body>
</html>
