<!DOCTYPE html>
<html>
<head>

<title>Credit Card Validation</title>

<style>

body{
    font-family:Arial;
}

form{
    width:40%;
    margin:auto;
    margin-top:100px;
    padding:30px;
    border:2px solid black;
    text-align:center;
}

h1{
    text-align:center;
}

input{
    width:80%;
    padding:10px;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
}

</style>

</head>

<body>

<form>

<h1>Credit Card Validation</h1>

<input type="text" id="card" placeholder="Enter Card Number">

<br><br>

<button type="button" onclick="validateCard()">Validate</button>

<h2 id="result"></h2>

</form>

<script>

function validateCard(){

let card=document.getElementById("card").value;

let master=/^5[1-5][0-9]{14}$/;

let visa=/^4[0-9]{12}(?:[0-9]{3})?$/;

let amex=/^3[47][0-9]{13}$/;

if(master.test(card)){

document.getElementById("result").innerHTML="Valid Master Card";

}

else if(visa.test(card)){

document.getElementById("result").innerHTML="Valid Visa Card";

}

else if(amex.test(card)){

document.getElementById("result").innerHTML="Valid American Express Card";

}

else{

document.getElementById("result").innerHTML="Invalid Card";

}

}

</script>

</body>
</html>
