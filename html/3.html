<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            padding:20px;
        }

        .main-box{
            width:85%;
            margin:auto;
            background:#e9ecff;
            padding:25px;
            border:1px solid #cfd5ff;
        }

        fieldset{
            margin-bottom:20px;
            padding:20px;
            border:1px solid gray;
            background:#eef0ff;
        }

        legend{
            font-size:20px;
            color:#333;
            padding:0 10px;
        }

        .form-group{
            margin-bottom:25px;
        }

        label{
            display:inline-block;
            width:140px;
            font-size:18px;
            color:#333;
        }

        input[type="text"],
        input[type="date"],
        input[type="tel"]{
            width:220px;
            height:28px;
            border:1px solid #ccc;
            padding-left:5px;
            font-size:16px;
        }

        input[type="radio"],
        input[type="checkbox"]{
            margin-right:5px;
        }

        input[type="color"]{
            width:60px;
            height:30px;
            border:none;
            cursor:pointer;
            vertical-align:middle;
        }

        .buttons{
            margin-top:10px;
        }

        button{
            padding:8px 18px;
            font-size:16px;
            border:1px solid gray;
            background:#f5f5f5;
            cursor:pointer;
            margin-right:10px;
        }

        button:hover{
            background:#ddd;
        }

    </style>

</head>

<body>

    <h2>
        6. Write a HTML code for the following snapshot.
    </h2>

    <div class="main-box">

        <form>

            <fieldset>

                <legend>Basic information</legend>

                <div class="form-group">
                    <label>Full name:</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Birth date:</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>Gender:</label>

                    <input type="radio" name="gender">Male

                    <input type="radio" name="gender">Female
                </div>

                <div class="form-group">
                    <label>Address:</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Phone number:</label>
                    <input type="tel">
                </div>

            </fieldset>

            <fieldset>

                <legend>Extra information</legend>

                <div class="form-group">

                    <label>Interests:</label>

                    <input type="checkbox">Books

                    <input type="checkbox">Movies

                    <input type="checkbox">Videogames

                </div>

                <div class="form-group">

                    <label>Favorite color:</label>

                    <input type="color" value="#000000">

                </div>

            </fieldset>

            <div class="buttons">

                <button type="submit">Send data</button>

                <button type="reset">Reset form</button>

            </div>

        </form>

    </div>

</body>
</html>
